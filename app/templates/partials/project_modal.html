<div class="modal-backdrop">
    <div class="modal">
        <div class="modal-title">Edit Project</div>
        <form
            method="post"
            action="{{ '/projects/' + project.id|string + '/edit' }}"
        >
            <div class="form-group">
                <label>Name</label>
                <input name="name" value="{{ project.name }}" required autofocus />
            </div>
            <dic class="form-group">
                <label>Building</label>
                <select name="building_id" required>
                    <option value="">- Select a building —</option>
                    {% for b in buildings %}
                    <option value="{{ b.id }}" {{ 'selected' if project.building_id == b.id }}>{{ b.name }}</option>
                    {% endfor %}
                </select>
            </dic>
            <div class="form-group">
                <label>Description</label>
                <textarea
                    name="description"
                    placeholder="Optional details..."
                    value="{{ project.description }}"
                ></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        {% for s in ['planning','active','on_hold','done'] %}
                        <option value="{{ s }}" {{'selected' if project and project.status == s }}>{{ s.replace('_', ' ').capitalize() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Total Budget (€)</label>
                    <input type="number" step="0.01" name="budget_total" placeholder="0.00" min="0" value="{{ project.budget_total }}">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Start Date</label>
                    <input
                        type="date"
                        name="start_date"
                        value="{{ project.start_date }}"
                    />
                </div>
                <div class="form-group">
                    <label>Estimated End Date</label>
                    <input
                        type="date"
                        name="estimated_end_date"
                        value="{{ project.estimated_end_date }}"
                    />
                </div>
            </div>

            <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">
                    Cancel
                </button>
                <button class="btn btn-danger btn-sm"
                  hx-delete="/projects/{{ project.id }}"
                  hx-confirm="Delete {{ project.name }}?"
                  hx-target="closest tr"
                  hx-swap="outerHTML"
                  style="margin-left:0.25rem">Delete
                </button>
                <button type="submit" class="btn btn-primary">
                    Update
                </button>
            </div>
        </form>
    </div>
</div>
