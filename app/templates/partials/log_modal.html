<div class="modal-backdrop">
  <div class="modal">
    <div class="modal-title">{{ "Edit Log" if log else "New Daily Log" }}</div>
    <form method="post" action="{{ '/logs/' + log.id|string + '/edit' if log else '/logs/new' }}">

      {% if not log %}
      <div class="form-group">
        <label>Project</label>
        <select name="project_id" required>
          <option value="">— Select a project —</option>
          {% for p in projects %}
          <option value="{{ p.id }}" {{ 'selected' if default_project_id == p.id }}>{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" value="{{ log.date if log else today }}" required>
          </div>
          <div class="form-group">
            <label>Author</label>
            <input name="author" value="{{ log.author if log else '' }}" placeholder="Your name" required>
          </div>
      </div>

        <div class="form-group">
            <label>Summary</label>
            <textarea name="summary" placeholder="What was done today?">{{ log.summary if log else '' }}</textarea>
        </div>

      <div class="form-row">
          <div class="form-group">
            <label>Hours spent</label>
            <input type="number" step="0.5" name="time_spent_hours" value="{{ log.time_spent_hours if log else 0 }}" min="0">
          </div>
          <div class="form-group">
            <label>Zone (optional)</label>
            <select name="zone_id">
              <option value="">— None —</option>
              {% for z in zones %}
              <option value="{{ z.id }}">{{ z.name }}</option>
              {% endfor %}
            </select>
          </div>
      </div>

      <div class="form-group">
        <label>People involved (comma-separated)</label>
        <input name="people" value="{{ log.people_involved if log else '' }}" placeholder="Alice, Bob, Marco">
      </div>

      {% if tasks %}
      <div class="form-group">
        <label>Tasks completed today</label>
        <div style="border:1px solid var(--border);border-radius:3px;padding:0.75rem;display:flex;flex-direction:column;gap:0.5rem;max-height:200px;overflow-y:auto">
          {% for t in tasks %}
          <label style="display:flex;align-items:center;gap:0.5rem;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
            <input type="checkbox" name="task_ids" value="{{ t.id }}" style="width:auto">
            <span>{{ t.title }}</span>
            <span class="badge badge-{{ t.status }}" style="margin-left:auto">{{ t.status }}</span>
          </label>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      {% if pending_expenses %}
      <div class="form-group">
        <label>Expenses to log</label>
        <div style="border:1px solid var(--border);border-radius:3px;padding:0.75rem;display:flex;flex-direction:column;gap:0.5rem">
          {% for e in pending_expenses %}
          <label style="display:flex;align-items:center;gap:0.5rem;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
            <input type="checkbox" name="expense_ids" value="{{ e.id }}" style="width:auto">
            <span>{{ e.label }}</span>
            <span style="margin-left:auto;color:var(--accent);font-family:'Barlow Condensed',sans-serif">{{ "%.2f"|format(e.amount) }} €</span>
          </label>
          {% endfor %}
        </div>
      </div>
      {% endif %}

      <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">{{ "Save Changes" if log else "Save Log" }}</button>
      </div>
    </form>
  </div>
</div>
