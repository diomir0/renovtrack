<div class="modal-backdrop">
  <div class="modal">
    <div class="modal-title">New Expense</div>
    <form method="post" action="/projects/{{ project_id }}/expenses">

      <div class="form-group">
        <label>Label</label>
        <input name="label" required autofocus placeholder="e.g. Timber delivery">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount (€)</label>
          <input type="number" step="0.01" name="amount" required min="0">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" name="date" value="{{ today }}" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select name="category">
            <option value="labor">Labor</option>
            <option value="material" selected>Material</option>
            <option value="equipment">Equipment</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Zone</label>
          <select name="zone_id">
            <option value="">— None —</option>
            {% for z in zones %}
            <option value="{{ z.id }}">{{ z.name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Paid by</label>
        <input name="paid_by" placeholder="Name">
      </div>
      <div style="display:flex;gap:0.5rem;justify-content:flex-end;margin-top:0.5rem">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Expense</button>
      </div>
    </form>
  </div>
</div>
