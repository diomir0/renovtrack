<div class="modal-backdrop">
    <div class="modal">
        <div class="modal-title">{{ 'Edit Expense' if expense else 'New Expense' }}</div>
        <form
            method="post"
            action="{{ '/expenses/' + expense.id|string + '/edit' if expense else '/projects/' + project_id|string + '/expenses' }}"
        >
            <div class="form-group">
                <label>Label</label>
                <input
                    name="label"
                    value="{{ expense.label if expense else '' }}"
                    required
                    autofocus
                    placeholder="e.g. Timber delivery"
                />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Amount (€)</label>
                    <input
                        type="number"
                        step="0.01"
                        name="amount"
                        value="{{ expense.amount if expense else '' }}"
                        required
                        min="0"
                    />
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input
                        type="date"
                        name="date"
                        value="{{ expense.date if expense else today }}"
                        required
                    />
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select
                        name="category"
                        value="{{ expense.category if expense else 'material' }}"
                    >
                        {% for c in ['labor','material','equipment','other'] %}
                        <option value="{{ c }}" {{ 'selected' if expense and expense.category == c or (not expense and c == 'material') }}>{{ c.capitalize() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Zone</label>
                    <select name="zone_id" value="{{ expense.zone_id if expense else '' }}">
                        <option value="">— None —</option>
                        {% for z in zones %}
                        <option value="{{ z.id }}">{{ z.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Paid by</label>
                <input
                    name="paid_by"
                    value="{{ expense.paid_by if expense else '' }}"
                    placeholder="Name"
                    required
                />
            </div>
            <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">
                    Cancel
                </button>
                <button type="submit" class="btn btn-primary">
                    {{ 'Save Changes' if expense else 'Create Expense' }}
                </button>
            </div>
        </form>
    </div>
</div>
