<div class="modal-backdrop">
    <div class="modal">
        <div class="modal-title">{{ "Edit Task" if task else "New Task" }}</div>
        <form
            method="post"
            action="{{ '/tasks/' + task.id|string + '/edit' if task else '/projects/' + project_id|string + '/tasks' }}"
        >

            <div class="form-group">
                <label>Title</label>
                <input name="title" value="{{ task.title if task else '' }}" required autofocus />
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea
                    name="description"
                    placeholder="Optional details..."
                    value="{{ task.description if task else '' }}"
                ></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        {% for s in ['todo','in_progress','blocked','done'] %}
                        <option value="{{ s }}" {{'selected' if task and task.status == s }}>{{ s.replace('_', ' ').capitalize() }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority">
                        {% for p in ['low','normal','high','urgent'] %}
                        <option value="{{ p }}" {{'selected' if task and task.priority == p }}>{{ p.capitalize() }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Assigned to</label>
                    <input
                        name="assigned_to"
                        placeholder="Name"
                        value="{{ task.assigned_to if task else '' }}"
                    />
                </div>
                <div class="form-group">
                    <label>Due date</label>
                    <input
                        type="date"
                        name="due_date"
                        value="{{ task.due_date if task else '' }}"
                    />
                </div>
            </div>
            <div style="display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem">
                <button type="button" class="btn btn-secondary" onclick="closeModal()">
                    Cancel
                </button>
                {% if task %}
                <button class="btn btn-danger btn-sm"
                  hx-delete="/tasks/{{ task.id }}"
                  hx-confirm="Delete {{ task.title }}?"
                  hx-target="closest tr"
                  hx-swap="outerHTML"
                  style="margin-left:0.25rem">Delete
                </button>
                {% endif %}
                <button type="submit" class="btn btn-primary">
                    {{ "Update Task" if task else "Create Task" }}
                </button>
            </div>
        </form>
    </div>
</div>
