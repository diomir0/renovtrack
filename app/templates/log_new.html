{% extends "base.html" %}
{% block title %}New Daily Log — RenovTrack{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New Daily Log</h1>
  <a href="/projects/{{ project.id }}" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div style="max-width:640px">
  <form method="post" action="/logs">
    <input type="hidden" name="project_id" value="{{ project.id }}">

    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ today }}" required>
      </div>
      <div class="form-group">
        <label>Author</label>
        <input name="author" placeholder="Your name" required>
      </div>
    </div>

    <div class="form-group">
      <label>Summary</label>
      <textarea name="summary" placeholder="What was done today?"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Hours spent</label>
        <input type="number" step="0.5" name="time_spent_hours" value="0" min="0">
      </div>
      <div class="form-group">
        <label>Zone (optional)</label>
        <select name="zone_id">
          <option value="">— None —</option>
          {% for z in zones %}
          <option value="{{ z.id }}">{{ z.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>People involved (comma-separated)</label>
      <input name="people" placeholder="Alice, Bob, Marco">
    </div>

    {% if tasks %}
    <div class="form-group">
      <label>Tasks completed today</label>
      <div style="border:1px solid var(--border);border-radius:3px;padding:0.75rem;display:flex;flex-direction:column;gap:0.5rem;max-height:200px;overflow-y:auto">
        {% for t in tasks %}
        <label style="display:flex;align-items:center;gap:0.5rem;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
          <input type="checkbox" name="task_ids" value="{{ t.id }}" style="width:auto">
          <span>{{ t.title }}</span>
          <span class="badge badge-{{ t.status }}" style="margin-left:auto">{{ t.status }}</span>
        </label>
        {% endfor %}
      </div>
    </div>
    {% endif %}

    {% if pending_expenses %}
    <div class="form-group">
      <label>Expenses to log</label>
      <div style="border:1px solid var(--border);border-radius:3px;padding:0.75rem;display:flex;flex-direction:column;gap:0.5rem">
        {% for e in pending_expenses %}
        <label style="display:flex;align-items:center;gap:0.5rem;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
          <input type="checkbox" name="expense_ids" value="{{ e.id }}" style="width:auto">
          <span>{{ e.label }}</span>
          <span style="margin-left:auto;color:var(--accent);font-family:'Barlow Condensed',sans-serif">{{ "%.2f"|format(e.amount) }} €</span>
        </label>
        {% endfor %}
      </div>
    </div>
    {% endif %}

    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem">
      <a href="/projects/{{ project.id }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save Log</button>
    </div>
  </form>
</div>
{% endblock %}
