{% extends "base.html" %}
{% block title %}New Building — RenovTrack{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New Building</h1>
  <a href="/" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div style="max-width:480px">
  <form method="post" action="/buildings/new">

    <div class="form-group">
      <label>Building Name</label>
      <input name="name" required autofocus placeholder="e.g. 14 Rue des Lilas">
    </div>

    <div class="form-group">
      <label>Address</label>
      <input name="address" placeholder="Optional">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Optional notes…"></textarea>
    </div>

    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem">
      <a href="/" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Create Building</button>
    </div>
  </form>
</div>
{% endblock %}
