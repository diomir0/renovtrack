{% extends "base.html" %}
{% block title %}New Project — RenovTrack{% endblock %}

{% block content %}
<div class="page-header">
  <h1>New Project</h1>
  <a href="/" class="btn btn-secondary btn-sm">← Back</a>
</div>

<div style="max-width:580px">
  <form method="post" action="/projects/new">

    <div class="form-group">
      <label>Project Name</label>
      <input name="name" required autofocus placeholder="e.g. Roof, Sanitation, Electrical…">
    </div>

    <div class="form-group">
      <label>Building</label>
      <select name="building_id" required>
        <option value="">— Select a building —</option>
        {% for b in buildings %}
        <option value="{{ b.id }}">{{ b.name }}</option>
        {% endfor %}
      </select>
      {% if not buildings %}
      <p style="font-size:0.78rem;color:var(--muted);margin-top:0.4rem">
        No buildings yet. <a href="/buildings/new" style="color:var(--accent)">Create one first →</a>
      </p>
      {% endif %}
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea name="description" placeholder="Optional notes about this project…"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="planning" selected>Planning</option>
          <option value="active">Active</option>
          <option value="on_hold">On Hold</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="form-group">
        <label>Total Budget (€)</label>
        <input type="number" step="0.01" name="budget_total" placeholder="0.00" min="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="start_date">
      </div>
      <div class="form-group">
        <label>Estimated End Date</label>
        <input type="date" name="estimated_end_date">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem">
      <a href="/" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Create Project</button>
    </div>
  </form>
</div>
{% endblock %}
